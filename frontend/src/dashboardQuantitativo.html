<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Substitua a tag antiga por esta no <head> -->
    <title>Dashboard Quantitativo</title>
    <link rel="icon" type="image/svg+xml" href="../assets/logo-ij.svg">
    <!-- Link para o CSS (Garanta que o arquivo esteja na mesma pasta) -->
    <link rel="stylesheet" href="../style/dashboardQuantitativo.css">
    <!-- Chart.js para os gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide para ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../style/navBar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="main-content">
        <div class="dashboard-wrapper">
            <div class="content">
                <div>
                    <h1>Métricas do Projeto</h1>
                    <p id="team-name">Equipe Alpha 2026</p>
                </div>
                </header>

                <!-- No seu dashboard.html, dentro do header ou acima dos cards -->
                <div class="filter-area">
                    <label for="teamSelect">Selecionar Projeto:</label>
                    <select id="teamSelect" onchange="changeTeam()">
                        <option value="equipe-alpha-2026">Equipe Alpha</option>
                        <option value="equipe-beta-2026">Equipe Beta</option>
                        <option value="equipe-gamma-2026">Equipe Gamma</option>
                        <option value="equipe-delta-2026">Equipe Delta</option>
                        <option value="equipe-epsilon-2026">Equipe Epsilon</option>
                        <option value="TODAS">Visão Geral (Todas)</option>
                    </select>
                </div>

                <!-- Cards com os dados diretos da API -->
                <div class="metrics-grid">
                    <div class="card" id="cardHealth">
                        <span class="card-label">Saúde do Projeto</span>
                        <h2 id="projectHealth">---</h2>
                    </div>
                    <div class="card">
                        <span class="card-label">Total de Tarefas</span>
                        <h2 id="totalTasks">0</h2>
                    </div>
                    <div class="card alert">
                        <span class="card-label">Tarefas Atrasadas</span>
                        <h2 id="overdueTasks">0</h2>
                    </div>
                    <div class="card warning">
                        <span class="card-label">Alta Prioridade</span>
                        <h2 id="highPriorityTasks">0</h2>
                    </div>
                </div>

                <!-- Gráficos baseados nos objetos da API -->
                <div class="charts-grid">
                    <div class="chart-container">
                        <h3>Status do Projeto</h3>
                        <div id="projects-canvas-container"><img src="../../" alt=""></div>
                    </div>
                    <div class="chart-container">
                        <h3>Distribuição de Tarefas</h3>
                        <canvas id="tasksChart"></canvas>
                    </div>
                </div>
                <!-- Abaixo da sua <section class="charts-grid"> -->
                <section class="full-width-chart">
                    <div class="chart-card">
                        <h3>Histórico de Atividade</h3>
                        <div class="canvas-container-history">
                            <canvas id="activityChart"></canvas>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script type="module" src="./js/navBar.js"></script>
    <script src="./js/dashboardQuantitativo.js"></script>
</body>

</html>
