<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban</title>
    <link rel="icon" type="image/svg+xml" href="../assets/logo-ij.svg">
    <link rel="stylesheet" href="../style/khaban.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Navbar -->
    <link rel="stylesheet" href="../style/navibar.css">
</head>
<body class="app-body">
    
    <main class="main-content">
        <div class="dots-bg"></div>
        <header class="app-header">
            <div class="header-logo-section">
                <h1 class="app-title">Projeto 1</h1>
            </div>
            
            <div class="header-actions-section">
                <div class="search-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="search-input" placeholder="Busque uma palavra..." class="search-input">
                </div>
                <button id="open-modal-btn" class="btn-primary">
                    <i data-lucide="plus" class="btn-icon"></i>
                    Nova tarefa
                </button>
            </div>
        </header>

        <div class="kanban-board">
            <!-- A Fazer -->
            <div class="kanban-column" data-status="A fazer">
                <div class="column-header">
                    <h2 class="column-title">A Fazer</h2>
                </div>
                <div class="column-cards" id="col-todo">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- Em andamento -->
            <div class="kanban-column" data-status="Em andamento">
                <div class="column-header">
                    <h2 class="column-title">Fazendo</h2>
                </div>
                <div class="column-cards" id="col-doing">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- Em revisão -->
            <div class="kanban-column" data-status="Em revisão">
                <div class="column-header">
                    <h2 class="column-title">Revisão</h2>
                </div>
                <div class="column-cards" id="col-review">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- Concluída -->
            <div class="kanban-column" data-status="Concluída">
                <div class="column-header">
                    <h2 class="column-title">Feito</h2>
                </div>
                <div class="column-cards" id="col-done">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for New Task -->
    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal-content" id="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Nova Tarefa</h3>
                <button id="close-modal-btn" class="btn-close">
                    <i data-lucide="x" class="close-icon"></i>
                </button>
            </div>
            
            <form id="task-form" class="task-form">
                <div class="form-group">
                    <label for="title" class="form-label">Título</label>
                    <input type="text" id="title" required class="form-input">
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">Descrição</label>
                    <textarea id="description" rows="3" class="form-input"></textarea>
                    
                    <!-- NOVO: Botão de Integração com Gemini -->
                    <button type="button" id="btn-ai-description" class="btn-ai-description">
                        ✨ Gerar descrição com Gemini
                    </button>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="priority" class="form-label">Prioridade</label>
                        <select id="priority" class="form-input">
                            <option value="Baixa">Baixa</option>
                            <option value="Média" selected>Média</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="assignee" class="form-label">Responsável</label>
                        <input type="text" id="assignee" required class="form-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dueDate" class="form-label">Data de Entrega</label>
                        <input type="date" id="dueDate" required class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="estimatedHours" class="form-label">Horas Estimas</label>
                        <input type="number" id="estimatedHours" required min="1" class="form-input">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">
                    Criar Tarefa
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="./js/navibar.js"></script>
    <script src="./js/kanban.js"></script>
</body>
</html>
